<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>普萊德 FIM 目標管理</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia','Segoe UI',serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 0 0 60px 0;
    overflow-x: hidden;
    position: relative;
    background: #1a4a7a;
  }
  #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; }

  .title-block { text-align: center; padding: 44px 24px 14px; }
  .title-card {
    display: inline-block;
    background: rgba(235, 243, 252, 0.78);
    backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
    border: 1px solid rgba(255,255,255,0.65); border-radius: 20px;
    padding: 28px 48px 24px;
    box-shadow: 0 6px 32px rgba(20,60,100,0.14), inset 0 1px 0 rgba(255,255,255,0.85), inset 0 0 0 0.5px rgba(255,255,255,0.4);
    max-width: 860px; width: 100%;
  }
  .main-title {
    font-size: clamp(18px, 4.2vw, 44px); font-weight: 900;
    letter-spacing: 2px; line-height: 1.2; margin-bottom: 10px;
    font-family: 'Georgia',serif;
    white-space: nowrap;
    overflow: hidden;
  }
  /* 普萊德 and 目標管理 = deep navy blue */
  .main-title { color: #0c2340; text-shadow: 0 1px 4px rgba(255,255,255,0.5); }
  .main-title span {
    background: linear-gradient(90deg,#c0392b,#8b2500,#c0392b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle {
    font-size: clamp(13px,2.2vw,19px); color: #2c4a62; font-weight: 600;
    letter-spacing: 0.8px; font-family: 'Segoe UI',sans-serif;
    text-shadow: 0 1px 2px rgba(255,255,255,0.3);
  }
  .subtitle em { color: #c0392b; font-style: italic; }

  /* 2x2 grid */
  .portals {
    width: 100%; max-width: 860px; padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-top: 16px;
  }
  @media (max-width: 560px) { .portals { grid-template-columns: 1fr; } }

  .portal-card {
    background: rgba(235,244,255,0.75);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.65); border-radius: 20px;
    padding: 28px 22px 22px; text-align: center; text-decoration: none;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    transition: transform 0.28s ease, background 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    cursor: pointer; position: relative; overflow: hidden;
    box-shadow: 0 4px 22px rgba(20,60,100,0.12), inset 0 1px 0 rgba(255,255,255,0.80);
  }
  .portal-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 4px; border-radius: 20px 20px 0 0; transition: height 0.28s ease;
  }
  /* top colour bars per card */
  .portal-card:nth-child(1)::before { background: linear-gradient(90deg,#c0392b,#e67e22); }
  .portal-card:nth-child(2)::before { background: linear-gradient(90deg,#e67e22,#d4a017); }
  .portal-card:nth-child(3)::before { background: linear-gradient(90deg,#2980b9,#1a5276); }
  .portal-card:nth-child(4)::before { background: linear-gradient(90deg,#8e44ad,#6c3483); }

  .portal-card:hover {
    transform: translateY(-8px);
    background: rgba(248,253,255,0.94);
    border-color: rgba(255,255,255,0.85);
    box-shadow: 0 20px 50px rgba(20,60,100,0.22), inset 0 1px 0 rgba(255,255,255,1), 0 0 0 1.5px rgba(255,255,255,0.55);
  }
  .portal-card:hover::before { height: 6px; }
  .portal-card:hover .card-title { color: #0f1f30; }
  .portal-card:hover .card-desc  { color: #1a3550; }
  .portal-card:hover .card-freq  { color: #4a7a9b; }
  .portal-card:hover .card-arrow { color: #1a3550; transform: translateX(5px); }

  .card-icon {
    width: 64px; height: 64px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center; font-size: 28px;
    transition: transform 0.28s ease;
  }
  .portal-card:hover .card-icon { transform: scale(1.10); }
  .portal-card:nth-child(1) .card-icon { background: rgba(192,57,43,0.10); }
  .portal-card:nth-child(2) .card-icon { background: rgba(230,126,34,0.10); }
  .portal-card:nth-child(3) .card-icon { background: rgba(41,128,185,0.12); }
  .portal-card:nth-child(4) .card-icon { background: rgba(142,68,173,0.12); }

  .card-title { font-size: 17px; font-weight: 800; color: #1a2e42; line-height: 1.35; font-family: 'Segoe UI',sans-serif; transition: color 0.28s; }
  .card-desc  { font-size: 13.5px; color: #2c4a62; line-height: 1.55; font-family: 'Segoe UI',sans-serif; transition: color 0.28s; }
  .card-freq  { font-size: 12px; color: #7a96ae; margin-top: -2px; transition: color 0.28s; }
  .card-arrow { font-size: 19px; color: #a0b8cc; margin-top: 4px; transition: color 0.2s, transform 0.2s; }

  /* glowing footer */
  .footer {
    margin-top: 38px;
    font-size: 15px; letter-spacing: 5px; font-weight: 700;
    font-family: 'Georgia', serif; color: #ffffff;
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% {
      opacity: 0.88;
      text-shadow:
        0 0 6px rgba(255,248,190,0.65),
        0 0 14px rgba(255,225,100,0.45),
        0 0 26px rgba(255,185,50,0.28);
    }
    50% {
      opacity: 1;
      text-shadow:
        0 0 8px rgba(255,255,230,1),
        0 0 20px rgba(255,235,120,0.95),
        0 0 40px rgba(255,200,60,0.75),
        0 0 65px rgba(255,160,30,0.45),
        0 0 95px rgba(255,130,20,0.20);
    }
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="content">
  <div class="title-block">
    <div class="title-card">
      <div class="main-title">普萊德 <span>FIM</span> 目標共好平台</div>
      <div class="subtitle">🌊 Happy <em>Natalie</em>, Happy Everybody ✈️</div>
    </div>
  </div>

  <div class="portals">
    <!-- Card 1 -->
    <a class="portal-card" href="https://leon820106-cloud.github.io/compliance-dashboard/" target="_blank">
      <div class="card-icon">📋</div>
      <div class="card-title">法遵申報管理</div>
      <div class="card-desc">各項公告申報事項遵循管理</div>
      <div class="card-freq">（不定期 / 每日）</div>
      <div class="card-arrow">→</div>
    </a>
    <!-- Card 2 -->
    <a class="portal-card" href="https://leon820106-cloud.github.io/dashboard/dashboard_1.html" target="_blank">
      <div class="card-icon">🎯</div>
      <div class="card-title">工作目標管理</div>
      <div class="card-desc">傳票目標進度追蹤與管理</div>
      <div class="card-freq">（每週）</div>
      <div class="card-arrow">→</div>
    </a>
    <!-- Card 3 -->
    <a class="portal-card" href="https://leon820106-cloud.github.io/Financial-Statement/" target="_blank">
      <div class="card-icon">📊</div>
      <div class="card-title">財報目標管理</div>
      <div class="card-desc">結帳作業與月結報表管理</div>
      <div class="card-freq">（每月）</div>
      <div class="card-arrow">→</div>
    </a>
    <!-- Card 4 -->
    <a class="portal-card" href="https://leon820106-cloud.github.io/FIMLEARNING/" target="_blank">
      <div class="card-icon">🎬</div>
      <div class="card-title">利他共好 ｜ 內外聯動</div>
      <div class="card-desc">FIM 知識影音平台</div>
      <div class="card-freq">（不定期）</div>
      <div class="card-arrow">→</div>
    </a>
  </div>

  <div class="footer">凝聚向心力 &nbsp;•&nbsp; 與時俱進</div>
</div>

<script>
const bg=document.getElementById('bgCanvas');
const bx=bg.getContext('2d');
let W=window.innerWidth,H=window.innerHeight;
function resize(){W=bg.width=window.innerWidth;H=bg.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const clouds=[
  {x:0.10,y:0.13,size:0.060,speed:0.000018,alpha:0.92},
  {x:0.36,y:0.07,size:0.072,speed:0.000014,alpha:0.86},
  {x:0.62,y:0.11,size:0.055,speed:0.000020,alpha:0.78},
  {x:0.82,y:0.19,size:0.065,speed:0.000016,alpha:0.80},
  {x:0.24,y:0.29,size:0.046,speed:0.000017,alpha:0.58},
  {x:0.52,y:0.26,size:0.038,speed:0.000022,alpha:0.50},
];
let planeX=1.12,planeY=0.22,lastTs=null;
const planeSpeed=0.000038;

function drawCloud(cx,cy,sz,alpha){
  bx.save();bx.globalAlpha=alpha;
  const p=[[0,0,sz],[-sz*.70,sz*.25,sz*.65],[sz*.70,sz*.20,sz*.70],
    [-sz*1.20,sz*.55,sz*.50],[sz*1.20,sz*.50,sz*.55],
    [-sz*.35,sz*.55,sz*.72],[sz*.35,sz*.50,sz*.68],[0,sz*.65,sz*.55]];
  bx.fillStyle='rgba(175,208,238,0.42)';
  p.forEach(([dx,dy,r])=>{bx.beginPath();bx.arc(cx+dx,cy+dy+r*.28,r*.82,0,Math.PI*2);bx.fill();});
  bx.fillStyle='#f6faff';
  p.forEach(([dx,dy,r])=>{bx.beginPath();bx.arc(cx+dx,cy+dy,r,0,Math.PI*2);bx.fill();});
  bx.fillStyle='rgba(255,255,255,0.90)';
  bx.beginPath();bx.arc(cx,cy-sz*.08,sz*.60,0,Math.PI*2);bx.fill();
  bx.restore();
}

function drawPlane(cx,cy,sc){
  bx.save();bx.translate(cx,cy);bx.scale(sc,sc);
  const r='#8b1a1a',d='#5a0f0f',m='#374151';
  bx.beginPath();bx.arc(-68,-2,10,0,Math.PI*2);bx.fillStyle=m;bx.fill();
  bx.beginPath();bx.arc(-68,-2,6,0,Math.PI*2);bx.fillStyle='#9ca3af';bx.fill();
  bx.save();bx.translate(-78,-2);bx.fillStyle=m;
  bx.beginPath();bx.ellipse(0,-12,3,12,0,0,Math.PI*2);bx.fill();
  bx.beginPath();bx.ellipse(0,12,3,12,0,0,Math.PI*2);bx.fill();bx.restore();
  bx.beginPath();bx.moveTo(-58,-8);bx.bezierCurveTo(-20,-14,30,-12,60,-4);bx.bezierCurveTo(70,-1,72,2,68,5);bx.bezierCurveTo(30,8,-20,8,-58,4);bx.closePath();
  bx.fillStyle=r;bx.fill();bx.strokeStyle=d;bx.lineWidth=1;bx.stroke();
  bx.beginPath();bx.ellipse(10,-11,14,6,-0.15,0,Math.PI*2);
  bx.fillStyle='rgba(150,200,240,0.35)';bx.fill();bx.strokeStyle=d;bx.lineWidth=0.8;bx.stroke();
  bx.beginPath();bx.moveTo(-30,-14);bx.lineTo(-44,-44);bx.lineTo(44,-44);bx.lineTo(38,-14);bx.closePath();
  bx.fillStyle=r;bx.fill();bx.strokeStyle=d;bx.lineWidth=1;bx.stroke();
  bx.beginPath();bx.moveTo(-20,6);bx.lineTo(-36,32);bx.lineTo(40,32);bx.lineTo(32,6);bx.closePath();
  bx.fillStyle=r;bx.fill();bx.strokeStyle=d;bx.lineWidth=1;bx.stroke();
  bx.strokeStyle=m;bx.lineWidth=2;bx.lineCap='round';
  [[-24,-14,-30,30],[16,-14,10,30]].forEach(([x1,y1,x2,y2])=>{bx.beginPath();bx.moveTo(x1,y1);bx.lineTo(x2,y2);bx.stroke();});
  bx.lineWidth=0.8;
  bx.beginPath();bx.moveTo(-24,-14);bx.lineTo(10,30);bx.stroke();
  bx.beginPath();bx.moveTo(16,-14);bx.lineTo(-30,30);bx.stroke();
  bx.beginPath();bx.moveTo(-30,36);bx.bezierCurveTo(-38,34,-44,44,-30,48);bx.lineTo(28,48);bx.bezierCurveTo(40,46,42,36,32,34);bx.closePath();
  bx.fillStyle=d;bx.fill();bx.strokeStyle='#3a0808';bx.lineWidth=0.8;bx.stroke();
  bx.beginPath();bx.moveTo(-28,42);bx.bezierCurveTo(-10,40,10,40,26,42);
  bx.strokeStyle='rgba(150,200,240,0.4)';bx.lineWidth=1.2;bx.stroke();
  bx.strokeStyle=m;bx.lineWidth=1.5;
  bx.beginPath();bx.moveTo(-8,8);bx.lineTo(-12,34);bx.stroke();
  bx.beginPath();bx.moveTo(14,8);bx.lineTo(18,34);bx.stroke();
  bx.beginPath();bx.moveTo(52,-4);bx.lineTo(72,-18);bx.lineTo(76,-14);bx.lineTo(64,-2);bx.closePath();
  bx.fillStyle=r;bx.fill();bx.strokeStyle=d;bx.lineWidth=0.8;bx.stroke();
  bx.beginPath();bx.moveTo(58,-6);bx.lineTo(62,-22);bx.lineTo(68,-18);bx.lineTo(64,-4);bx.closePath();
  bx.fillStyle=d;bx.fill();
  bx.restore();
}

function drawBg(W,H){
  const sky=bx.createLinearGradient(0,0,0,H*.58);
  sky.addColorStop(0,'#3a7fbf');sky.addColorStop(.22,'#5aaae8');
  sky.addColorStop(.52,'#90d0f5');sky.addColorStop(.76,'#ddf0fc');sky.addColorStop(1,'#faecc8');
  bx.fillStyle=sky;bx.fillRect(0,0,W,H);
  const sx=W*.72,sy=H*.44,sr=Math.min(W,H)*.065;
  const hl=bx.createRadialGradient(sx,sy,sr*.3,sx,sy,sr*5);
  hl.addColorStop(0,'rgba(255,225,120,0.75)');hl.addColorStop(.4,'rgba(255,185,60,0.35)');hl.addColorStop(1,'rgba(255,140,30,0)');
  bx.fillStyle=hl;bx.beginPath();bx.arc(sx,sy,sr*5,0,Math.PI*2);bx.fill();
  const dk=bx.createRadialGradient(sx,sy,0,sx,sy,sr);
  dk.addColorStop(0,'#fffde0');dk.addColorStop(.45,'#ffe878');dk.addColorStop(1,'#f5a800');
  bx.fillStyle=dk;bx.beginPath();bx.arc(sx,sy,sr,0,Math.PI*2);bx.fill();
  const st=H*.56,sea=bx.createLinearGradient(0,st,0,H);
  sea.addColorStop(0,'#2e9ec4');sea.addColorStop(.2,'#2188ac');
  sea.addColorStop(.55,'#176a90');sea.addColorStop(1,'#0d4a6a');
  bx.fillStyle=sea;bx.fillRect(0,st,W,H-st);
  const hb=bx.createLinearGradient(0,st-H*.06,0,st+H*.06);
  hb.addColorStop(0,'rgba(250,230,180,0)');hb.addColorStop(.5,'rgba(220,190,110,0.22)');hb.addColorStop(1,'rgba(220,190,110,0)');
  bx.fillStyle=hb;bx.fillRect(0,st-H*.06,W,H*.12);
  const rf=bx.createLinearGradient(sx-W*.1,st,sx+W*.1,H);
  rf.addColorStop(0,'rgba(255,220,100,0.50)');rf.addColorStop(1,'rgba(255,180,50,0)');
  bx.fillStyle=rf;bx.beginPath();bx.moveTo(sx-W*.07,st);bx.lineTo(sx+W*.07,st);bx.lineTo(sx+W*.22,H);bx.lineTo(sx-W*.22,H);bx.closePath();bx.fill();
  bx.lineCap='round';
  for(let i=0;i<7;i++){
    const wy=st+H*(.04+i*.08);
    bx.strokeStyle=`rgba(200,240,255,${.18+i*.04})`;bx.lineWidth=1.2+i*.2;
    bx.beginPath();
    for(let wx=0;wx<W;wx+=55){bx.moveTo(wx,wy);bx.quadraticCurveTo(wx+14,wy-4,wx+27,wy);bx.quadraticCurveTo(wx+41,wy+4,wx+55,wy);}
    bx.stroke();
  }
  const fi=(p,c,a)=>{bx.save();bx.globalAlpha=a||1;bx.fillStyle=c;bx.beginPath();bx.moveTo(p[0][0],p[0][1]);for(let i=1;i<p.length;i++)bx.lineTo(p[i][0],p[i][1]);bx.closePath();bx.fill();bx.restore();};
  fi([[W*.02,H*.62],[W*.05,H*.55],[W*.10,H*.52],[W*.16,H*.54],[W*.20,H*.58],[W*.22,H*.63],[W*.02,H*.63]],'#7ab8cc',.50);
  fi([[W*.76,H*.60],[W*.80,H*.55],[W*.86,H*.53],[W*.91,H*.56],[W*.94,H*.60],[W*.76,H*.61]],'#6aaabe',.45);
  bx.save();bx.globalAlpha=.85;
  fi([[W*.08,H*.68],[W*.12,H*.60],[W*.16,H*.56],[W*.21,H*.58],[W*.25,H*.63],[W*.27,H*.69]],'#9a7050');
  bx.fillStyle='#5aaa48';
  bx.beginPath();bx.ellipse(W*.16,H*.575,W*.025,H*.025,0,0,Math.PI*2);bx.fill();
  bx.beginPath();bx.ellipse(W*.20,H*.585,W*.018,H*.02,0,0,Math.PI*2);bx.fill();
  bx.restore();
  const sg=bx.createLinearGradient(0,H*.82,0,H);
  sg.addColorStop(0,'#c89060');sg.addColorStop(.5,'#a87040');sg.addColorStop(1,'#885030');
  bx.fillStyle=sg;bx.beginPath();bx.moveTo(0,H*.88);
  bx.quadraticCurveTo(W*.15,H*.82,W*.28,H*.85);bx.quadraticCurveTo(W*.40,H*.88,W*.50,H*.84);
  bx.quadraticCurveTo(W*.62,H*.80,W*.75,H*.86);bx.quadraticCurveTo(W*.88,H*.90,W,H*.86);
  bx.lineTo(W,H);bx.lineTo(0,H);bx.closePath();bx.fill();
  const pn=(tx,ty,th)=>{
    bx.fillStyle='#5a8840';bx.fillRect(tx-th*.04,ty,th*.08,th*.22);
    bx.fillStyle='#50a038';
    bx.beginPath();bx.ellipse(tx,ty-th*.18,th*.42,th*.18,0,0,Math.PI*2);bx.fill();
    bx.beginPath();bx.ellipse(tx-th*.15,ty-th*.22,th*.22,th*.14,-.2,0,Math.PI*2);bx.fill();
    bx.beginPath();bx.ellipse(tx+th*.18,ty-th*.20,th*.20,th*.13,.2,0,Math.PI*2);bx.fill();
    bx.fillStyle='#3a8c30';bx.beginPath();bx.ellipse(tx,ty-th*.25,th*.35,th*.13,0,0,Math.PI*2);bx.fill();
  };
  pn(W*.03,H*.85,H*.16);pn(W*.08,H*.87,H*.13);pn(W*.93,H*.84,H*.15);pn(W*.98,H*.86,H*.12);
  bx.strokeStyle='#2a6080';bx.lineWidth=1.4;bx.lineCap='round';
  [[W*.28,H*.38],[W*.33,H*.36],[W*.38,H*.39],[W*.58,H*.33],[W*.63,H*.35]].forEach(([gx,gy])=>{
    bx.beginPath();bx.moveTo(gx-7,gy+3);bx.quadraticCurveTo(gx,gy,gx+7,gy+3);bx.stroke();
  });
}

function loop(ts){
  if(!lastTs)lastTs=ts;
  const dt=ts-lastTs;lastTs=ts;
  bg.width=W;
  drawBg(W,H);
  clouds.forEach(c=>{
    c.x+=c.speed*dt;if(c.x>1.30)c.x=-0.28;
    drawCloud(c.x*W,c.y*H,c.size*Math.min(W,H),c.alpha);
  });
  planeX-=planeSpeed*dt;if(planeX<-0.18)planeX=1.15;
  drawPlane(planeX*W,planeY*H,Math.min(W,H)*0.00055);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
